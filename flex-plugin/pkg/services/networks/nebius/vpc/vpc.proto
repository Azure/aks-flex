edition = "2024";

package networks.nebius.network;

option go_package = "github.com/Azure/aks-flex/flex-plugin/pkg/services/networks/nebius/vpc";

import "flex-plugin/api/api.proto";
import "flex-plugin/pkg/services/networks/api/features/vnet/vnet.proto";

message Network {
  api.Metadata metadata = 1;

  NetworkSpec spec = 2;

  NetworkStatus status = 3;
}

message NetworkSpec {
  string project_id = 1;
  string region = 2;

  vnet.Config vnet = 3;
}

message NetworkStatus {
  // ProvisioningState string
  // LastError         error

  string pool_id = 1;
  string vnet_id = 2;
  string subnet_id = 3;
}