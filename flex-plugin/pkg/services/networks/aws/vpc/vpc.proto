edition = "2024";

package networks.aws.vpc;

option go_package = "github.com/Azure/aks-flex/flex-plugin/pkg/services/networks/aws/vpc";

import "flex-plugin/api/api.proto";
import "flex-plugin/pkg/services/networks/api/features/vnet/vnet.proto";

message Network {
  api.Metadata metadata = 1;

  NetworkSpec spec = 2;

  NetworkStatus status = 3;
}

message NetworkSpec {
  string region = 1;

  vnet.Config vnet = 2;

  // DeletePolicy string ?
}

message NetworkStatus {
  // ProvisioningState string
  // LastError         error

  string vpc            = 2;
  string subnet         = 3;
  string route_table    = 4;
  string security_group = 5;
}
