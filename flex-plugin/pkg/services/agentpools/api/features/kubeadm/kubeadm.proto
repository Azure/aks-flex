edition = "2024";

package kubeadm;

option go_package = "github.com/Azure/aks-flex/flex-plugin/pkg/services/agentpools/api/features/kubeadm";

message Taint {
  string key = 1;
  string value = 2;
  string effect = 3;
}

message Config {
  string server                     = 1;
  bytes  certificate_authority_data = 2;
  string token                      = 3;

  // List of node labels to assign using the kubelet flag
  map<string, string> node_labels = 4;

  // WireGuard IP for --node-ip kubelet argument (optional)
  string node_ip = 5;

  // List of taints to assign using the kubelet flag, in the format "key=value:effect"
  repeated Taint register_with_taints = 6;
}
