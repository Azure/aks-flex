edition = "2024";

package agentpools.aws.ubuntu2404instance;

option go_package = "github.com/Azure/aks-flex/flex-plugin/pkg/services/agentpools/aws/ubuntu2404instance";

import "stretch/plugin/api/api.proto";
import "stretch/plugin/pkg/services/agentpools/api/features/kubeadm/kubeadm.proto";

message AgentPool {
  api.Metadata metadata = 1;

  AgentPoolSpec spec = 2;

  AgentPoolStatus status = 3;
}

message AgentPoolSpec {
  string region = 1;

  string subnet         = 2;
  string security_group = 3;

  kubeadm.Config kubeadm = 4;

  // DeletePolicy string ?
}

message AgentPoolStatus {
  // ProvisioningState string
  // LastError         error

  string instance = 1;
}
