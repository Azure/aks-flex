edition = "2024";

package ipsecvpn;

option go_package = "github.com/Azure/aks-flex/flex-plugin/pkg/services/peerings/aws/ipsecvpn";

import "flex-plugin/api/api.proto";
import "flex-plugin/pkg/services/peerings/api/features/ipsec/ipsec.proto";

message Peering {
  api.Metadata metadata = 1;

  PeeringSpec spec = 2;

  PeeringStatus status = 3;
}

message PeeringSpec {
  string region = 1;

  string vpc         = 2;
  string route_table = 3;

  ipsec.Config ipsec = 4;

  // DeletePolicy string ?
}

message PeeringStatus {
  // ProvisioningState string
  // LastError         error

  string          vpn_connection       = 1;
  repeated string outside_ip_addresses = 2;
}
