apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nebius-cpu-nodepool
spec:
  template:
    metadata:
      labels:
        nodepool: nebius-cpu-nodepool
    spec:
      nodeClassRef:
        group: flex.aks.azure.com
        kind: NebiusNodeClass
        name: nebius
      requirements:
        - key: karpenter.azure.com/sku-cpu
          operator: Gt
          values: ["8"]
      startupTaints:
        # NOTE: this start up taint is required to tell karpenter to avoid
        #       adding the cilium taint for scheduling decision.
        - key: "node.cilium.io/agent-not-ready"
          effect: "NoSchedule"
          value: "true"
  limits:
    cpu: "1000"
    memory: 1000Gi
