apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nebius-gpu-nodepool
spec:
  template:
    metadata:
      labels:
        nodepool: nebius-gpu-nodepool
        nvidia.com/gpu.present: "true"
    spec:
      nodeClassRef:
        group: flex.aks.azure.com
        kind: NebiusNodeClass
        name: nebius
      requirements:
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      startupTaints:
        # NOTE: this start up taint is required to tell karpenter to avoid
        #       adding the cilium taint for scheduling decision.
        - key: "node.cilium.io/agent-not-ready"
          effect: "NoSchedule"
          value: "true"
  limits:
    cpu: "1000"
    memory: 10000Gi
    nvidia.com/gpu: "64"
