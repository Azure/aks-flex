---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unbounded-cni-frr-config
  namespace: unbounded-cni
data:
  daemons: |
    # Default FRR daemon settings for unbounded-cni.
    # Enable only what the node agent requires.

    zebra=yes
    mgmtd=yes
    bfdd=yes
    staticd=yes

    # These daemons are not built in the container image
    bgpd=no
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    pim6d=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    fabricd=no
    vrrpd=no
    pathd=no

    # Watchfrr is enabled by default when available.
    watchfrr=yes
    watchfrr_options="--limit-fds 100000"

    # Additional options (left empty by default).
    zebra_options="--limit-fds 100000 --log stdout --log-level info"
    mgmtd_options="--limit-fds 100000 --log stdout --log-level info"
    staticd_options="--limit-fds 100000 --log stdout --log-level info"
    bfdd_options="--limit-fds 100000 --log stdout --log-level info"

    # These daemons are not built in the container image
    # bgpd_options="--limit-fds 100000 --log stdout --log-level info"
    # ospfd_options="--limit-fds 100000 --log stdout --log-level info"
    # ospf6d_options="--limit-fds 100000 --log stdout --log-level info"
    # ripd_options="--limit-fds 100000 --log stdout --log-level info"
    # ripngd_options="--limit-fds 100000 --log stdout --log-level info"
    # isisd_options="--limit-fds 100000 --log stdout --log-level info"
    # pimd_options="--limit-fds 100000 --log stdout --log-level info"
    # pim6d_options="--limit-fds 100000 --log stdout --log-level info"
    # nhrpd_options="--limit-fds 100000 --log stdout --log-level info"
    # eigrpd_options="--limit-fds 100000 --log stdout --log-level info"
    # babeld_options="--limit-fds 100000 --log stdout --log-level info"
    # sharpd_options="--limit-fds 100000 --log stdout --log-level info"
    # pbrd_options="--limit-fds 100000 --log stdout --log-level info"
    # fabricd_options="--limit-fds 100000 --log stdout --log-level info"
    # vrrpd_options="--limit-fds 100000 --log stdout --log-level info"
    # pathd_options="--limit-fds 100000 --log stdout --log-level info"
  frr.conf: |
    !
    ! Default FRR configuration for unbounded-cni.
    !
    frr defaults traditional
    hostname unbounded-cni
    service integrated-vtysh-config
    !
  mgmtd.conf: ""
  staticd.conf: ""
  vtysh.conf: |
    service integrated-vtysh-config
  zebra.conf: ""
