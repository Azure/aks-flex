              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SitePeeringSpec defines desired state of SitePeering.
            properties:
              bfdSettings:
                description: BFDSettings controls BFD settings for inter-site peering.
                properties:
                  detectMultiplier:
                    description: |-
                      DetectMultiplier is the multiplier used to determine session down detection.
                      Valid range is 1-255.
                    format: int32
                    type: integer
                  enabled:
