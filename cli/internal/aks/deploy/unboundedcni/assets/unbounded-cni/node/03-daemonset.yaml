---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: unbounded-cni-node
  namespace: unbounded-cni
  labels:
    app.kubernetes.io/name: unbounded-cni-node
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unbounded-cni-node
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
  template:
    metadata:
      annotations:
        kubernetes.azure.com/set-kube-service-host-fqdn: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9998"
        prometheus.io/path: "/metrics"
      labels:
        app.kubernetes.io/name: unbounded-cni-node
        app.kubernetes.io/component: node
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: unbounded-cni-node
      # Tolerate all taints - CNI must run on every node
      tolerations:
        - operator: Exists
      # Prioritize scheduling - CNI is critical for pod networking
      priorityClassName: system-node-critical
      initContainers:
        # Install CNI plugins to host
        - name: install-cni-plugins
          image: unboundedcnitme.azurecr.io/unbounded-cni-node:v0.7.0
          imagePullPolicy: Always
          command:
            - /usr/local/bin/node-agent-init.sh
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
          securityContext:
            allowPrivilegeEscalation: true
            runAsUser: 0
            privileged: true
      containers:
        - name: node
          image: unboundedcnitme.azurecr.io/unbounded-cni-node:v0.7.0
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: unbounded-cni-config
                  key: LOG_LEVEL
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - -v=$(LOG_LEVEL)
            - --config-file=/etc/unbounded-cni/config.yaml
          ports:
            - name: health
              containerPort: 9998
              protocol: TCP
          volumeMounts:
            - name: cni-conf
              mountPath: /host/etc/cni/net.d
            - name: wireguard
              mountPath: /host/etc/wireguard
            - name: iproute2
              mountPath: /etc/iproute2
            - name: tmp
              mountPath: /tmp
            - name: vartmp
              mountPath: /var/tmp
            - name: runtime-config
              mountPath: /etc/unbounded-cni/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            runAsUser: 0
            privileged: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-conf
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: wireguard
          hostPath:
            path: /etc/wireguard
            type: DirectoryOrCreate
        - name: iproute2
          hostPath:
            path: /etc/iproute2
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
        - name: vartmp
          emptyDir: {}
        - name: runtime-config
          configMap:
            name: unbounded-cni-config
      securityContext:
        seccompProfile:
          type: RuntimeDefault
