# This rule is not used by the project cluster-api-provider-flex itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the infrastructure.flex-capi.aks.azure.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cluster-api-provider-flex
    app.kubernetes.io/managed-by: kustomize
  name: nebiusmachinetemplate-editor-role
rules:
- apiGroups:
  - infrastructure.flex-capi.aks.azure.com
  resources:
  - nebiusmachinetemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.flex-capi.aks.azure.com
  resources:
  - nebiusmachinetemplates/status
  verbs:
  - get
