name: Release Karpenter Helm Chart

on:
  push:
    tags:
      - 'karpenter-chart/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version override (e.g. 0.2.0). Leave empty to use Chart.yaml version.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  CHART_NAME: karpenter

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Determine chart version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/karpenter-chart/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/karpenter-chart/v}"
          else
            VERSION=$(grep '^version:' karpenter/charts/karpenter/Chart.yaml | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${VERSION}"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package and push Helm chart
        run: |
          karpenter/hack/release-chart.sh \
            --version "${{ steps.version.outputs.version }}" \
            --registry "oci://${{ env.REGISTRY }}/${{ github.repository }}/charts" \
            --push

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/karpenter-chart/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Karpenter Helm Chart v${{ steps.version.outputs.version }}"
          body: |
            ## Karpenter Helm Chart v${{ steps.version.outputs.version }}

            ### Install from OCI registry
            ```bash
            helm install karpenter oci://${{ env.REGISTRY }}/${{ github.repository }}/charts/${{ env.CHART_NAME }} \
              --version ${{ steps.version.outputs.version }} \
              --namespace kube-system
            ```

            ### Install from downloaded archive
            ```bash
            helm install karpenter ./${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz \
              --namespace kube-system
            ```
          files: .helm-packages/${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz
          fail_on_unmatched_files: true
